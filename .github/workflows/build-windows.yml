# .github/workflows/build-windows-free.yml
# 修复版：修正表达式闭合 + 分支/标签构建支持

name: Build Windows Free Edition

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 2025.9.3)'
        required: false
        default: ''
      build_ref:
        description: 'Git ref (分支/标签), 留空则使用触发源'
        required: false
        default: ''
        type: string

env:
  NODE_VERSION: '24'
  RUST_VERSION: 'stable'
  BUILD_TARGET: 'x86_64-pc-windows-msvc'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # 🔹 步骤 1: 确定构建引用 (拆分为独立步骤，避免表达式解析问题)
      - name: Determine build ref
        id: determine_ref
        shell: bash
        run: |
          BUILD_REF="${{ inputs.build_ref }}"
          if [ -n "$BUILD_REF" ]; then
            echo "ref=$BUILD_REF" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi

      # 🔹 步骤 2: Checkout - 使用步骤输出，避免复杂表达式
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ steps.determine_ref.outputs.ref }}

      # ... [Node.js/Rust 设置步骤保持不变] ...

      # 🔹 步骤 3: 安装 wasm32 目标 + wasm-pack (修复 wasm 构建)
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      # ... [依赖安装/缓存步骤] ...

      # 🔹 步骤 4: Rust 缓存 - ✅ 修正路径为 crates-tauri
      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'crates-tauri'  # ✅ 关键修复: 实际路径
          cache-on-failure: true
          prefix-key: 'v0-rust'

      # ... [构建步骤] ...

      # 🔹 步骤 5: Tauri 构建 - ✅ 修正产物路径
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          # ✅ 使用 format 函数确保表达式安全
          tagName: '${{ inputs.version != '' && format(''v{0}'', inputs.version) || github.ref_name }}'
          releaseName: 'Yaak Free v${{ inputs.version != '' && inputs.version || github.ref_name }}'
          releaseBody: |
            ## Yaak 免费商用版本 (Windows amd64)
            - 触发源: ${{ github.event_name }}
            - 引用: ${{ steps.determine_ref.outputs.ref }}
            - 提交: ${{ github.sha }}
          releaseDraft: true
          prerelease: false
          args: '--target ${{ env.BUILD_TARGET }} --bundles nsis'

      # 🔹 步骤 6: 上传产物 - ✅ 修正路径
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yaak-windows-free-${{ github.sha }}
          path: |
            crates-tauri/target/${{ env.BUILD_TARGET }}/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7
