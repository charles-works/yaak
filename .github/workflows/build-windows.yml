name: Build Yaak for Windows

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]
    paths:
      - 'crates-tauri/**'
      - 'src-web/**'
      - 'packages/**'
      - 'package.json'
      - '.github/workflows/build-windows.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js (v24+)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 🦀 Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: 🗄️ Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-build
          cache-on-failure: true

      - name: 🔧 Install Windows Build Dependencies
        run: |
          # Install WebView2 runtime (required for Tauri)
          Write-Host "Installing WebView2..."
          $webview2Url = "https://go.microsoft.com/fwlink/p/?LinkId=2124703"
          $installer = "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
          Invoke-WebRequest -Uri $webview2Url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList '/silent', '/install' -Wait
          
          # Install protoc for plugin system
          choco install protoc -y --no-progress

      - name: 📥 Install NPM Dependencies
        run: npm ci

      - name: 🔨 Bootstrap Project
        run: npm run bootstrap
        env:
          YAAK_TARGET_ARCH: x64

      - name: 🧪 Run Tests (Optional)
        run: |
          npm run lint
          # Skip JS/Rust tests to save time if not needed
          # vp test
          # cargo test --all --exclude yaak-cli

      - name: 🏗️ Build Windows Application
        run: npm run app-build
        env:
          YAAK_TARGET_ARCH: x64
          # ⚠️ 关键：不使用 release 配置，避免包含许可证检查
          # 官方: --config ./crates-tauri/yaak-app/tauri.release.conf.json
          # 我们: 使用默认配置 (无商用限制)

      - name: 📦 Collect Build Artifacts
        run: |
          # 创建输出目录
          mkdir -p artifacts
          
          # 复制构建产物 (根据实际情况调整路径)
          # 默认构建输出在: src-tauri/target/release/bundle/
          Copy-Item -Path "src-tauri/target/release/bundle/nsis/*.exe" -Destination "artifacts/" -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/release/bundle/msi/*.msi" -Destination "artifacts/" -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/release/yaak.exe" -Destination "artifacts/" -ErrorAction SilentlyContinue
          
          # 列出产物
          Get-ChildItem -Path artifacts -Recurse

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yaak-windows-x64-build
          path: artifacts/
          retention-days: 7
          if-no-files-found: warn

      - name: ✅ Build Complete
        run: |
          Write-Host "✅ Windows build completed successfully!"
          Write-Host "📦 Artifacts uploaded and available for download"
          Write-Host "🔗 Check the 'Actions' tab -> This workflow -> 'Artifacts' section"
