# .github/workflows/build-windows-free.yml
# 修复版 v2：修正路径 + wasm-pack + 分支/标签构建支持

name: Build Windows Free Edition

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 2025.9.3)'
        required: false
        default: ''
      # 🔹 新增：支持构建指定分支/标签
      build_ref:
        description: 'Git ref (分支/标签), 留空则使用触发源'
        required: false
        default: ''
        type: string

env:
  NODE_VERSION: '24'
  RUST_VERSION: 'stable'
  BUILD_TARGET: 'x86_64-pc-windows-msvc'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # 1. 检出代码 - 🔹 支持动态引用
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ inputs.build_ref != '' && inputs.build_ref || github.ref }}

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 3. 设置 Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ env.BUILD_TARGET }}
          components: rustfmt, clippy

      # 🔹 新增: 安装 wasm32 目标 (yaak-templates 需要)
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      # 🔹 新增: 安装 wasm-pack (修复 wasm 构建失败)
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      # 4. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 5. Rust 缓存 - 🔹 修正路径: crates-tauri (非 src-tauri!)
      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'crates-tauri'  # ✅ 关键修复: 实际路径
          cache-on-failure: true
          prefix-key: 'v0-rust'

      # 6. 检查 WebView2 (Windows runner 已预装)
      - name: Check WebView2
        shell: pwsh
        run: |
          $wv2 = Get-ItemProperty "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}" -ErrorAction SilentlyContinue
          if ($wv2) {
            Write-Host "✅ WebView2: $($wv2.pv)"
          } else {
            Write-Host "⚠️ WebView2 未检测到 (安装程序会自动处理)"
          }

      # 7. 构建前端
      - name: Build frontend
        run: npm run build
        env:
          YAAK_LICENSE_TYPE: 'free'
          YAAK_ENABLE_TELEMETRY: 'false'
          YAAK_ENABLE_UPDATER: 'false'

      # 8. 构建 Tauri 应用
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.version != '' && inputs.version || github.ref_name }}
          releaseName: 'Yaak Free v${{ inputs.version != '' && inputs.version || github.ref_name }}'
          releaseBody: |
            ## Yaak 免费商用版本 (Windows amd64)
            - 触发源: ${{ github.event_name }}
            - 引用: ${{ inputs.build_ref != '' && inputs.build_ref || github.ref }}
            - 提交: ${{ github.sha }}
          releaseDraft: true
          prerelease: false
          args: '--target ${{ env.BUILD_TARGET }} --bundles nsis'

      # 9. 上传产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yaak-windows-free-${{ github.sha }}
          path: |
            crates-tauri/target/${{ env.BUILD_TARGET }}/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7

      # 10. 生成校验和 (仅 tag)
      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $path = "crates-tauri/target/${{ env.BUILD_TARGET }}/release/bundle/nsis"
          if (Test-Path $path) {
            Get-ChildItem $path -Filter *.exe | ForEach-Object {
              $hash = Get-FileHash $_.FullName -Algorithm SHA256
              "$($hash.Hash) $($_.Name)" | Out-File -Append -FilePath "$path/checksums.sha256"
            }
          }
