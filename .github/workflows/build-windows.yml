# .github/workflows/build-windows.yml
name: Build Yaak for Windows

on:
  workflow_dispatch:
    inputs:
      build_tag:
        description: 'Tag to build (leave empty for latest commit)'
        required: false
        type: string
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'crates-tauri/**'
      - 'src-web/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-windows.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 90
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.build_tag || github.ref }}

      - name: 🏷️ Get Version Info
        id: version
        shell: pwsh
        run: |
          $tag = git describe --tags --exact-match 2>$null
          if (-not $tag) {
            $tag = git describe --tags --abbrev=0 2>$null
          }
          if (-not $tag) {
            $tag = "dev-$(git rev-parse --short HEAD)"
          }
          $version = $tag -replace '^v', ''
          
          Write-Host "Tag: $tag"
          Write-Host "Version: $version"
          
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "artifact_name=yaak-windows-x64-$version" >> $env:GITHUB_OUTPUT

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 🦀 Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: 🗄️ Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-build
          cache-on-failure: true

      - name: 🔧 Install Windows Build Dependencies
        shell: pwsh
        run: |
          Write-Host "Installing WebView2 Runtime..."
          $webview2Url = "https://go.microsoft.com/fwlink/p/?LinkId=2124703"
          $installer = "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
          Invoke-WebRequest -Uri $webview2Url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList '/silent', '/install' -Wait
          Write-Host "✅ WebView2 installed"
          
          Write-Host "Installing protoc..."
          choco install protoc -y --no-progress
          Write-Host "✅ protoc installed"

      - name: 📥 Install NPM Dependencies
        run: npm ci

      - name: 🔨 Bootstrap Project
        run: npm run bootstrap
        env:
          YAAK_TARGET_ARCH: x64

      - name: 🏗️ Build Windows Application
        run: npm run app-build
        env:
          YAAK_TARGET_ARCH: x64

      - name: 🔍 Debug Build Output
        shell: pwsh
        run: |
          Write-Host "=== Build Output Analysis ==="
          
          # 检查实际输出位置
          $paths = @(
            "target/release",
            "target/release/bundle",
            "src-tauri/target/release",
            "src-tauri/target/release/bundle"
          )
          
          foreach ($path in $paths) {
            if (Test-Path $path) {
              Write-Host "✅ EXISTS: $path"
              Get-ChildItem -Path $path -File -ErrorAction SilentlyContinue | 
                Where-Object { $_.Extension -in @('.exe', '.msi') } |
                ForEach-Object { Write-Host "    - $($_.Name)" }
            } else {
              Write-Host "❌ NOT EXISTS: $path"
            }
          }
          
          # 搜索所有 exe 文件
          Write-Host "`n=== All EXE Files ==="
          Get-ChildItem -Path "target" -Recurse -Include "*.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch "target\\release\\build" -and $_.Length -gt 1MB } |
            Select-Object -First 10 FullName, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}} |
            Format-Table -AutoSize

      - name: 📦 Collect Build Artifacts
        shell: pwsh
        run: |
          mkdir artifacts -ErrorAction SilentlyContinue
          
          # ✅ 正确路径：项目根目录的 target/ (Tauri v2 工作空间)
          $bundlePath = "target/release/bundle"
          $exePath = "target/release"
          $version = "${{ steps.version.outputs.version }}"
          
          Write-Host "Collecting artifacts for version: $version"
          Write-Host "Bundle path: $bundlePath"
          Write-Host "Exe path: $exePath"
          
          $foundCount = 0
          
          # 1. 复制 NSIS 安装包
          if (Test-Path "$bundlePath/nsis") {
            Write-Host "`n📦 Found NSIS bundle"
            Get-ChildItem -Path "$bundlePath/nsis/*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
              $newName = $_.Name -replace '\.exe$', "-$version.exe"
              Copy-Item -Path $_.FullName -Destination "artifacts/$newName" -Force
              Write-Host "  ✅ Copied NSIS: $newName"
              $foundCount++
            }
          } else {
            Write-Host "  ⚠️ NSIS bundle not found at $bundlePath/nsis"
          }
          
          # 2. 复制 MSI 安装包
          if (Test-Path "$bundlePath/msi") {
            Write-Host "`n📦 Found MSI bundle"
            Get-ChildItem -Path "$bundlePath/msi/*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
              $newName = $_.Name -replace '\.msi$', "-$version.msi"
              Copy-Item -Path $_.FullName -Destination "artifacts/$newName" -Force
              Write-Host "  ✅ Copied MSI: $newName"
              $foundCount++
            }
          } else {
            Write-Host "  ⚠️ MSI bundle not found at $bundlePath/msi"
          }
          
          # 3. 复制独立可执行文件 (根据日志：yaak-app.exe)
          if (Test-Path "$exePath/yaak-app.exe") {
            Write-Host "`n📦 Found portable executable"
            Copy-Item -Path "$exePath/yaak-app.exe" -Destination "artifacts/yaak-portable-$version.exe" -Force
            Write-Host "  ✅ Copied portable: yaak-portable-$version.exe"
            $foundCount++
          } else {
            Write-Host "  ⚠️ yaak-app.exe not found at $exePath/yaak-app.exe"
            
            # 尝试查找其他可能的 exe 名称
            $alternatives = @("yaak.exe", "Yaak.exe", "app.exe")
            foreach ($alt in $alternatives) {
              if (Test-Path "$exePath/$alt") {
                Copy-Item -Path "$exePath/$alt" -Destination "artifacts/yaak-portable-$version.exe" -Force
                Write-Host "  ✅ Copied alternative: $alt"
                $foundCount++
                break
              }
            }
          }
          
          # 4. 复制必要的 DLL 文件
          Get-ChildItem -Path "$exePath/*.dll" -ErrorAction SilentlyContinue | 
            Where-Object { $_.Name -like "*yaak*" -or $_.Name -like "*tauri*" } |
            ForEach-Object {
              Copy-Item -Path $_.FullName -Destination "artifacts/" -Force
              Write-Host "  ✅ Copied DLL: $($_.Name)"
              $foundCount++
            }
          
          # 5. 验证产物（关键修复！）
          Write-Host "`n=== Artifact Summary ==="
          $actualCount = (Get-ChildItem -Path artifacts -File -ErrorAction SilentlyContinue).Count
          
          if ($actualCount -eq 0) {
            Write-Host "::error::No build artifacts found in artifacts directory!"
            Write-Host "Available files in target/release:"
            Get-ChildItem -Path "target/release" -File -ErrorAction SilentlyContinue | 
              Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}} |
              Format-Table -AutoSize
            exit 1
          }
          
          Write-Host "✅ Total artifacts collected: $actualCount"
          Write-Host "`n📦 Build Artifacts:"
          Get-ChildItem -Path artifacts -File | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  $($_.Name) - ${size}MB"
          }

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: artifacts/*
          retention-days: 14
          if-no-files-found: error
          compression-level: 6

      - name: 🚀 Create GitHub Release (Tag Only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: Yaak ${{ steps.version.outputs.version }}
          body: |
            ## Yaak ${{ steps.version.outputs.version }}
            
            ### 📦 Downloads
            
            | Type | File | Description |
            |------|------|-------------|
            | **NSIS Installer** | `Yaak_*_${{ steps.version.outputs.version }}_x64-setup.exe` | Recommended |
            | **MSI Installer** | `Yaak_*_${{ steps.version.outputs.version }}_x64_en-US.msi` | Enterprise |
            | **Portable** | `yaak-portable-${{ steps.version.outputs.version }}.exe` | No install |
            
            ### 🔧 Build Info
            - **Commit**: ${{ github.sha }}
            - **Build Time**: ${{ github.event.head_commit.timestamp || github.event.created_at }}
            
            ### ⚠️ License
            Self-compiled version without commercial restrictions.
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Build Complete
        shell: pwsh
        run: |
          Write-Host "========================================"
          Write-Host "✅ Windows build completed successfully!"
          Write-Host "========================================"
          Write-Host "📦 Artifact: ${{ steps.version.outputs.artifact_name }}"
          Write-Host "🏷️ Version: ${{ steps.version.outputs.version }}"
          Write-Host "🔗 Commit: ${{ github.sha }}"
          
          if ("${{ startsWith(github.ref, 'refs/tags/v') }}" -eq "true") {
            Write-Host "🚀 Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          }
          Write-Host "========================================"
