# .github/workflows/build-windows-free.yml
# 构建Yaak Windows amd64免费商用版本
# 修复版：使用npm、修正路径、更新Node版本

name: Build Windows Free Edition

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 2025.9.3)'
        required: false
        default: ''

env:
  # Node.js 24 (2026年6月后Node 20将被弃用)
  NODE_VERSION: '24'
  # Rust稳定版
  RUST_VERSION: 'stable'
  # 构建目标
  BUILD_TARGET: 'x86_64-pc-windows-msvc'
  # 强制使用Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # 2. 设置Node.js环境 (使用Node 24)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 3. 设置Rust环境
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ env.BUILD_TARGET }}
          components: rustfmt, clippy

      # 4. 安装前端依赖 (使用npm而非pnpm)
      - name: Install frontend dependencies
        run: npm ci

      # 5. 设置Rust缓存 (在依赖安装后执行，确保目录存在)
      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'
          cache-on-failure: true

      # 6. 安装Windows依赖 (WebView2运行时)
      - name: Install WebView2 Runtime
        shell: pwsh
        run: |
          # 下载并静默安装WebView2运行时
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri 'https://go.microsoft.com/fwlink/p/?LinkId=2124703' -OutFile 'MicrosoftEdgeWebview2Setup.exe'
          Start-Process -FilePath .\MicrosoftEdgeWebview2Setup.exe -ArgumentList '/install', '/silent' -Wait

      # 7. 构建前端应用
      - name: Build frontend
        run: npm run build
        env:
          # 免费商用版本标识
          YAAK_LICENSE_TYPE: 'free'
          YAAK_ENABLE_TELEMETRY: 'false'
          YAAK_ENABLE_UPDATER: 'false'

      # 8. 构建Tauri应用 (Windows NSIS安装包)
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 可选：签名密钥
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Yaak Free v${{ github.ref_name }}'
          releaseBody: |
            ## Yaak 免费商用版本 (Windows amd64)
            
            ### 安装说明
            1. 下载 `Yaak_${{ github.ref_name }}_x64-setup.exe`
            2. 双击运行安装程序
            3. 按照向导完成安装
            
            ### 版本特性
            - ✅ 完全免费商用
            - ✅ 无功能限制
            - ✅ 无遥测/数据收集
            - ✅ 离线优先设计
            
            ### 文件校验
            - 安装包: `Yaak_${{ github.ref_name }}_x64-setup.exe`
            
            ### 系统要求
            - Windows 10 或更高版本 (64位)
            - WebView2运行时 (安装程序会自动安装)
            
            **注意**: 这是社区构建的免费版本，基于MIT许可证开源。
          releaseDraft: true
          prerelease: false
          # 仅构建NSIS安装包(支持Windows 7+)
          args: '--target ${{ env.BUILD_TARGET }} --bundles nsis'

      # 9. 上传构建产物到Artifacts (便于调试)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yaak-windows-free-${{ github.sha }}
          path: |
            src-tauri/target/${{ env.BUILD_TARGET }}/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7

      # 10. 生成校验文件
      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $installerPath = "src-tauri/target/${{ env.BUILD_TARGET }}/release/bundle/nsis"
          if (Test-Path $installerPath) {
            Get-ChildItem $installerPath -Filter *.exe | ForEach-Object {
              $hash = Get-FileHash $_.FullName -Algorithm SHA256
              "$($hash.Hash)  $($_.Name)" | Out-File -Append -FilePath "$installerPath/checksums.sha256"
              Write-Host "SHA256: $($hash.Hash)  $($_.Name)"
            }
          }

      # 11. 输出构建信息
      - name: Build summary
        shell: bash
        run: |
          echo "✅ 构建完成!"
          echo "版本: ${{ github.ref_name }}"
          echo "目标平台: Windows amd64"
          echo "构建类型: 免费商用版"
          echo "Node版本: $(node -v)"
          echo "Rust版本: $(rustc --version)"
          echo "输出目录:"
          ls -la src-tauri/target/${{ env.BUILD_TARGET }}/release/bundle/nsis/ || true
