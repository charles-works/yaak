name: Build Yaak for Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates-tauri/**'
      - 'src-web/**'
      - 'packages/**'
      - 'package.json'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 🦀 Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: 🗄️ Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-build
          cache-on-failure: true

      - name: 🔧 Install Windows Build Dependencies
        run: |
          # Install WebView2
          $webview2Url = "https://go.microsoft.com/fwlink/p/?LinkId=2124703"
          $installer = "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
          Invoke-WebRequest -Uri $webview2Url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList '/silent', '/install' -Wait
          
          # Install protoc
          choco install protoc -y --no-progress

      - name: 📥 Install NPM Dependencies
        run: npm ci

      - name: 🔨 Bootstrap Project
        run: npm run bootstrap
        env:
          YAAK_TARGET_ARCH: x64

      - name: 🏗️ Build Windows Application
        run: npm run app-build
        env:
          YAAK_TARGET_ARCH: x64

      - name: 📦 Collect Build Artifacts
        run: |
          mkdir artifacts
          
          # ✅ 正确路径：项目根目录的 target/ (Tauri v2 工作空间)
          $bundlePath = "target/release/bundle"
          $exePath = "target/release"
          
          Write-Host "Searching for build outputs..."
          
          # 列出所有可能的构建产物
          Get-ChildItem -Path "target/release" -ErrorAction SilentlyContinue | 
            Where-Object { $_.Name -match "\.(exe|msi|nsis)" } |
            ForEach-Object { Write-Host "Found: $($_.FullName)" }
          
          # 复制 NSIS 安装包
          if (Test-Path "$bundlePath/nsis") {
            Copy-Item -Path "$bundlePath/nsis/*.exe" -Destination "artifacts/" -Force
            Write-Host "✅ Copied NSIS installers"
          }
          
          # 复制 MSI 安装包
          if (Test-Path "$bundlePath/msi") {
            Copy-Item -Path "$bundlePath/msi/*.msi" -Destination "artifacts/" -Force
            Write-Host "✅ Copied MSI installers"
          }
          
          # 复制独立可执行文件 (根据日志，实际名称是 yaak-app.exe)
          if (Test-Path "$exePath/yaak-app.exe") {
            Copy-Item -Path "$exePath/yaak-app.exe" -Destination "artifacts/yaak-portable.exe" -Force
            Write-Host "✅ Copied portable executable (yaak-app.exe)"
          }
          
          # 如果找不到，搜索整个 target 目录
          if ((Get-ChildItem -Path artifacts -ErrorAction SilentlyContinue).Count -eq 0) {
            Write-Host "::warning::No artifacts found in expected paths, searching..."
            Get-ChildItem -Path "target" -Recurse -Include "*.exe","*.msi" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -notmatch "target\\release\\build" } |
              ForEach-Object {
                Write-Host "Found: $($_.FullName)"
                Copy-Item -Path $_.FullName -Destination "artifacts/" -Force
              }
          }
          
          # 显示所有产物
          Write-Host "`n📦 Build Artifacts:"
          Get-ChildItem -Path artifacts -Recurse | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  $($_.Name) - ${size}MB"
          }

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yaak-windows-x64
          path: artifacts/*
          retention-days: 7
          if-no-files-found: error

      - name: ✅ Build Complete
        run: |
          Write-Host "✅ Windows build completed!"
          Write-Host "📦 Download artifacts from the Actions tab"
