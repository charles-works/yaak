name: Build Yaak for Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates-tauri/**'
      - 'src-web/**'
      - 'packages/**'
      - 'package.json'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 🦀 Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: 🗄️ Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-build
          cache-on-failure: true

      - name: 🔧 Install Windows Build Dependencies
        run: |
          # Install WebView2
          $webview2Url = "https://go.microsoft.com/fwlink/p/?LinkId=2124703"
          $installer = "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
          Invoke-WebRequest -Uri $webview2Url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList '/silent', '/install' -Wait
          
          # Install protoc
          choco install protoc -y --no-progress

      - name: 📥 Install NPM Dependencies
        run: npm ci

      - name: 🔨 Bootstrap Project
        run: npm run bootstrap
        env:
          YAAK_TARGET_ARCH: x64

      - name: 🏗️ Build Windows Application
        run: npm run app-build
        env:
          YAAK_TARGET_ARCH: x64
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # 如果需要代码签名，添加以下环境变量
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: 📦 Collect Build Artifacts
        run: |
          mkdir artifacts
          
          # Tauri 默认输出路径
          $bundlePath = "src-tauri/target/release/bundle"
          
          if (Test-Path $bundlePath) {
            Write-Host "Bundle path exists: $bundlePath"
            
            # 复制 NSIS 安装包
            if (Test-Path "$bundlePath/nsis") {
              Copy-Item -Path "$bundlePath/nsis/*.exe" -Destination "artifacts/" -Force
              Write-Host "✅ Copied NSIS installers"
            }
            
            # 复制 MSI 安装包
            if (Test-Path "$bundlePath/msi") {
              Copy-Item -Path "$bundlePath/msi/*.msi" -Destination "artifacts/" -Force
              Write-Host "✅ Copied MSI installers"
            }
            
            # 复制 deb（如果有）
            if (Test-Path "$bundlePath/deb") {
              Copy-Item -Path "$bundlePath/deb/*.deb" -Destination "artifacts/" -Force
              Write-Host "✅ Copied DEB packages"
            }
          }
          
          # 复制独立的 exe 文件
          if (Test-Path "src-tauri/target/release/yaak.exe") {
            Copy-Item -Path "src-tauri/target/release/yaak.exe" -Destination "artifacts/yaak-portable.exe" -Force
            Write-Host "✅ Copied portable executable"
          }
          
          # 显示所有产物
          Write-Host "`n📦 Build Artifacts:"
          Get-ChildItem -Path artifacts -Recurse | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  $($_.Name) - ${size}MB"
          }

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yaak-windows-x64
          path: artifacts/*
          retention-days: 7
          if-no-files-found: error  # 改为 error 以便发现问题

      - name: ✅ Build Complete
        run: |
          Write-Host "✅ Windows build completed!"
          Write-Host "📦 Download artifacts from the Actions tab"
