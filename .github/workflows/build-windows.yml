# .github/workflows/build-windows.yml
# 修复版：路径修正 + wasm-pack + 表达式安全 + 分支/标签构建支持

name: Build Windows Free Edition

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 2025.9.3)'
        required: false
        default: ''
      build_ref:
        description: 'Git ref (分支/标签), 留空则使用触发源'
        required: false
        default: ''
        type: string

env:
  NODE_VERSION: '24'
  RUST_VERSION: 'stable'
  BUILD_TARGET: 'x86_64-pc-windows-msvc'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ─────────────────────────────────────────────────────
      # 步骤1: 计算构建引用 (避免复杂表达式解析问题)
      # ─────────────────────────────────────────────────────
      - name: Determine build ref
        id: determine_ref
        shell: bash
        run: |
          if [ -n "${{ inputs.build_ref }}" ]; then
            echo "ref=${{ inputs.build_ref }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────────────────
      # 步骤2: Checkout - 使用步骤输出，避免表达式歧义
      # ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ steps.determine_ref.outputs.ref }}

      # ─────────────────────────────────────────────────────
      # 步骤3: Setup Node.js
      # ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # ─────────────────────────────────────────────────────
      # 步骤4: Setup Rust
      # ─────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ env.BUILD_TARGET }}
          components: rustfmt, clippy

      # ─────────────────────────────────────────────────────
      # 🔧 新增: 安装 wasm32 目标 (yaak-templates 需要)
      # ─────────────────────────────────────────────────────
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      # ─────────────────────────────────────────────────────
      # 🔧 新增: 安装 wasm-pack (修复 'wasm-pack' not recognized)
      # ─────────────────────────────────────────────────────
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      # ─────────────────────────────────────────────────────
      # 步骤5: Install dependencies
      # ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ─────────────────────────────────────────────────────
      # 🔧 修复: Rust cache 路径 src-tauri → crates-tauri
      # ─────────────────────────────────────────────────────
      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'crates-tauri'  # ✅ 关键修复: 实际路径
          cache-on-failure: true
          prefix-key: 'v0-rust'

      # ─────────────────────────────────────────────────────
      # 步骤6: Check WebView2 (Windows runner 已预装)
      # ─────────────────────────────────────────────────────
      - name: Check WebView2
        shell: pwsh
        run: |
          $wv2 = Get-ItemProperty "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}" -ErrorAction SilentlyContinue
          if ($wv2) {
            Write-Host "✅ WebView2: $($wv2.pv)"
          } else {
            Write-Host "⚠️ WebView2 未检测到 (安装程序会自动处理)"
          }

      # ─────────────────────────────────────────────────────
      # 步骤7: Build frontend
      # ─────────────────────────────────────────────────────
      - name: Build frontend
        run: npm run build
        env:
          YAAK_LICENSE_TYPE: 'free'
          YAAK_ENABLE_TELEMETRY: 'false'
          YAAK_ENABLE_UPDATER: 'false'

      # ─────────────────────────────────────────────────────
      # 步骤8: 计算 release 元数据 (避免 tauri-action 中复杂表达式)
      # ─────────────────────────────────────────────────────
      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          REF_NAME="${{ github.ref_name }}"
          
          if [ -n "$VERSION" ]; then
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
            echo "name=Yaak Free v$VERSION" >> $GITHUB_OUTPUT
          else
            echo "tag=$REF_NAME" >> $GITHUB_OUTPUT
            echo "name=Yaak Free v$REF_NAME" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────────────────
      # 🔧 修复: Tauri build - 使用步骤输出 + 修正产物路径
      # ─────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release_meta.outputs.tag }}
          releaseName: ${{ steps.release_meta.outputs.name }}
          releaseBody: |
            ## Yaak 免费商用版本 (Windows amd64)
            ### 构建信息
            - 触发源: ${{ github.event_name }}
            - 引用: ${{ steps.determine_ref.outputs.ref }}
            - 提交: ${{ github.sha }}
          releaseDraft: true
          prerelease: false
          args: '--target ${{ env.BUILD_TARGET }} --bundles nsis'

      # ─────────────────────────────────────────────────────
      # 🔧 修复: Upload artifacts - 修正路径 crates-tauri
      # ─────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yaak-windows-free-${{ github.sha }}
          path: |
            crates-tauri/target/${{ env.BUILD_TARGET }}/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7

      # ─────────────────────────────────────────────────────
      # 步骤9: Generate checksums (仅 tag 构建时)
      # ─────────────────────────────────────────────────────
      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $path = "crates-tauri/target/${{ env.BUILD_TARGET }}/release/bundle/nsis"
          if (Test-Path $path) {
            Get-ChildItem $path -Filter *.exe | ForEach-Object {
              $hash = Get-FileHash $_.FullName -Algorithm SHA256
              "$($hash.Hash) $($_.Name)" | Out-File -Append -FilePath "$path/checksums.sha256"
            }
          }
