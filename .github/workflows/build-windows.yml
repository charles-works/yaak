name: Build Yaak for Windows x64 (Unsigned)

on:
  push:
    branches: [main, master]
    # 如需在标签推送时构建，取消下面的注释
    # tags: [v*]
  workflow_dispatch:

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci
          cache-on-failure: true

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: vp install

      - name: Bootstrap
        run: npm run bootstrap
        env:
          YAAK_TARGET_ARCH: "x64"

      - name: Lint
        run: npm run lint

      - name: Run JS Tests
        run: vp test

      - name: Run Rust Tests
        run: cargo test --all --exclude yaak-cli

      # ---------- 版本号处理 ----------
      # 根据触发方式生成有效的 semver 版本号
      - name: Determine version
        id: version
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag' -and $env:GITHUB_REF_NAME -match '^v\d') {
            # 标签以 v 开头，去掉 v 前缀
            $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            # 非标签构建：使用 0.0.0-<短提交哈希>
            $SHORT_SHA = $env:GITHUB_SHA.Substring(0, 7)
            $VERSION = "0.0.0-$SHORT_SHA"
          }
          echo "VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "Using version: $VERSION"
        shell: pwsh

      # 直接修改 Tauri 配置文件中的版本号（不依赖可能失效的 replace-version 脚本）
      - name: Set version in config
        run: |
          $configPath = "crates-tauri/yaak-app/tauri.release.conf.json"
          $json = Get-Content $configPath -Raw | ConvertFrom-Json
          $json.package.version = $env:VERSION
          $json | ConvertTo-Json -Depth 10 | Set-Content $configPath -Encoding utf8
        shell: pwsh

      # 构建（不创建 GitHub Release）
      - uses: tauri-apps/tauri-action@v0
        env:
          YAAK_TARGET_ARCH: "x64"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 不设置任何签名相关环境变量
        with:
          # 不指定 releaseId/tagName 等，避免自动发布 Release
          args: "--config ./crates-tauri/yaak-app/tauri.release.conf.json"

      # 上传安装包作为工作流产物
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: yaak-windows-x64-installer
          path: target/release/bundle/nsis/*.exe
