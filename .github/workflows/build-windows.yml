# .github/workflows/build-windows.yml
name: Build Yaak for Windows

on:
  workflow_dispatch:
    inputs:
      build_tag:
        description: 'Tag to build (leave empty for latest commit)'
        required: false
        type: string
  push:
    branches: [main]
    tags:
      - 'v*'
    paths:
      - 'crates-tauri/**'
      - 'src-web/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-windows.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 90
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.build_tag || github.ref }}

      - name: 🏷️ Get Version Info
        id: version
        shell: pwsh
        run: |
          $tag = git describe --tags --exact-match 2>$null
          if (-not $tag) {
            $tag = git describe --tags --abbrev=0 2>$null
          }
          if (-not $tag) {
            $tag = "dev-$(git rev-parse --short HEAD)"
          }
          $version = $tag -replace '^v', ''
          
          Write-Host "Tag: $tag"
          Write-Host "Version: $version"
          
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "artifact_name=yaak-windows-x64-$version" >> $env:GITHUB_OUTPUT

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 🦀 Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: 🗄️ Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-build
          cache-on-failure: true

      - name: 🔧 Install Windows Build Dependencies
        shell: pwsh
        run: |
          Write-Host "Installing WebView2 Runtime (for bundler)..."
          $webview2Url = "https://go.microsoft.com/fwlink/p/?LinkId=2124703"
          $installer = "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
          Invoke-WebRequest -Uri $webview2Url -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList '/silent', '/install' -Wait
          Write-Host "✅ WebView2 Runtime installed"
          
          Write-Host "Installing protoc..."
          choco install protoc -y --no-progress
          Write-Host "✅ protoc installed"

      - name: 📥 Install NPM Dependencies
        run: npm ci

      - name: 🔨 Bootstrap Project
        run: npm run bootstrap
        env:
          YAAK_TARGET_ARCH: x64

      - name: 🏗️ Build Windows Application with Bundler
        shell: pwsh
        run: |
          Write-Host "Building with Tauri bundler enabled..."
          
          # ✅ 关键修复：使用 --bundles 参数强制生成安装包
          # 默认配置可能未启用 bundler，这里显式指定
          npx tauri build --bundles nsis --target x86_64-pc-windows-msvc
          
          Write-Host "✅ Build completed"
        env:
          YAAK_TARGET_ARCH: x64
          # 如果需要代码签名，取消以下注释并配置 secrets
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: 🔍 Debug Build Output
        shell: pwsh
        run: |
          Write-Host "=== Build Output Analysis ==="
          
          # 检查实际输出位置
          $paths = @(
            "target/release",
            "target/release/bundle",
            "target/release/bundle/nsis",
            "target/release/bundle/msi"
          )
          
          foreach ($path in $paths) {
            if (Test-Path $path) {
              Write-Host "✅ EXISTS: $path"
              Get-ChildItem -Path $path -File -ErrorAction SilentlyContinue | 
                Where-Object { $_.Extension -in @('.exe', '.msi') } |
                ForEach-Object { Write-Host "    - $($_.Name)" }
            } else {
              Write-Host "❌ NOT EXISTS: $path"
            }
          }
          
          # 搜索所有 exe/msi 文件
          Write-Host "`n=== All Installer Files ==="
          Get-ChildItem -Path "target" -Recurse -Include "*.exe","*.msi" -ErrorAction SilentlyContinue |
            Where-Object { 
              $_.FullName -notmatch "target\\release\\build" -and 
              $_.FullName -notmatch "deps" -and
              $_.Length -gt 1MB 
            } |
            Select-Object FullName, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}} |
            Format-Table -AutoSize

      - name: 📦 Collect Build Artifacts
        shell: pwsh
        run: |
          mkdir artifacts -ErrorAction SilentlyContinue
          
          # ✅ 正确路径：项目根目录的 target/ (Tauri v2 工作空间)
          $bundlePath = "target/release/bundle"
          $exePath = "target/release"
          $version = "${{ steps.version.outputs.version }}"
          
          Write-Host "Collecting artifacts for version: $version"
          $foundCount = 0
          
          # 1. 复制 NSIS 安装包（包含 WebView2 安装逻辑）
          $nsisPath = "$bundlePath/nsis"
          if (Test-Path $nsisPath) {
            Write-Host "`n📦 Found NSIS bundle at $nsisPath"
            Get-ChildItem -Path "$nsisPath/*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
              $newName = $_.Name -replace '\.exe$', "-$version.exe"
              Copy-Item -Path $_.FullName -Destination "artifacts/$newName" -Force
              Write-Host "  ✅ Copied NSIS installer: $newName"
              $foundCount++
            }
          } else {
            Write-Host "::warning::NSIS bundle not found at $nsisPath"
          }
          
          # 2. 复制 MSI 安装包（如果有）
          $msiPath = "$bundlePath/msi"
          if (Test-Path $msiPath) {
            Write-Host "`n📦 Found MSI bundle at $msiPath"
            Get-ChildItem -Path "$msiPath/*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
              $newName = $_.Name -replace '\.msi$', "-$version.msi"
              Copy-Item -Path $_.FullName -Destination "artifacts/$newName" -Force
              Write-Host "  ✅ Copied MSI installer: $newName"
              $foundCount++
            }
          }
          
          # 3. 复制独立可执行文件作为备用
          if (Test-Path "$exePath/yaak-app.exe") {
            Write-Host "`n📦 Found portable executable"
            Copy-Item -Path "$exePath/yaak-app.exe" -Destination "artifacts/yaak-portable-$version.exe" -Force
            Write-Host "  ✅ Copied portable: yaak-portable-$version.exe"
            $foundCount++
          }
          
          # 4. 验证产物
          Write-Host "`n=== Artifact Summary ==="
          $actualCount = (Get-ChildItem -Path artifacts -File -ErrorAction SilentlyContinue).Count
          
          if ($actualCount -eq 0) {
            Write-Host "::error::No build artifacts found!"
            Write-Host "Available files in target/release/bundle:"
            if (Test-Path "$bundlePath") {
              Get-ChildItem -Path $bundlePath -Recurse -File | Select-Object FullName
            }
            exit 1
          }
          
          Write-Host "✅ Total artifacts collected: $actualCount"
          Write-Host "`n📦 Build Artifacts:"
          Get-ChildItem -Path artifacts -File | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            Write-Host "  $($_.Name) - ${size}MB"
          }

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: artifacts/*
          retention-days: 14
          if-no-files-found: error
          compression-level: 6

      - name: 🚀 Create GitHub Release (Tag Only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: Yaak ${{ steps.version.outputs.version }}
          body: |
            ## Yaak ${{ steps.version.outputs.version }}
            
            ### 📦 Downloads
            
            | Type | File | Description |
            |------|------|-------------|
            | **NSIS Installer** ⭐ | `Yaak_*_${{ steps.version.outputs.version }}_x64-setup.exe` | **Recommended** - Includes WebView2 auto-install |
            | **Portable** | `yaak-portable-${{ steps.version.outputs.version }}.exe` | Requires manual WebView2 installation |
            
            ### 🔧 Build Info
            - **Commit**: ${{ github.sha }}
            - **Build Time**: ${{ github.event.head_commit.timestamp || github.event.created_at }}
            - **Runner**: Windows x64
            
            ### ⚠️ License
            Self-compiled version without commercial restrictions (MIT License).
            For official builds: https://yaak.app
            
            ### 📝 First Run Notes
            1. NSIS installer will auto-install WebView2 if needed
            2. First launch may take 10-30 seconds for initialization
            3. If portable version fails to start, install WebView2 manually:
               https://developer.microsoft.com/en-us/microsoft-edge/webview2/
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Build Complete
        shell: pwsh
        run: |
          Write-Host "========================================"
          Write-Host "✅ Windows build completed successfully!"
          Write-Host "========================================"
          Write-Host "📦 Artifact: ${{ steps.version.outputs.artifact_name }}"
          Write-Host "🏷️ Version: ${{ steps.version.outputs.version }}"
          Write-Host "🔗 Commit: ${{ github.sha }}"
          
          if ("${{ startsWith(github.ref, 'refs/tags/v') }}" -eq "true") {
            Write-Host "🚀 Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          }
          Write-Host "========================================"
